version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: radar-har-backend
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    environment:
      - MODEL_CHECKPOINT=/app/artifacts/best_model.pt
      - REFERENCE_MODEL_PATH=/app/artifacts/reference/model.joblib
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CORS_ORIGINS=*
    depends_on:
      - mlflow
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: radar-har-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: radar-har-mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  mlflow_data:
